[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm turbo build --filter=web..."

[deploy]
startCommand = "cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
